<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mi Perfil | HRYET</title>

<link rel="stylesheet" href="css/perfil.css">

</head>

<body>

<div class="profile-container">

    <div class="profile-card">

        <img
        id="profilePhoto"
        src="images/avatar.png"
        alt="Perfil">

        <h1 id="username">
            Cargando...
        </h1>

        <p id="email">
            usuario@hryet.com
        </p>

        <div class="stats">

            <div>

                <h2 id="likes">
                    0
                </h2>

                <span>Likes</span>

            </div>

            <div>

                <h2 id="scans">
                    0
                </h2>

                <span>Escaneos</span>

            </div>

        </div>

        <div id="qr"></div>

    </div>

</div>

<script type="module" src="js/profile.js"></script>

</body>

</html>
